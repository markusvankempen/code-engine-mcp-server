[tools]
node = "24.2.0"

[env]
# Loaded automatically when entering this directory
# Copy .env.example to .env and fill in your values
_.file = ".env"

[tasks.test]
description = "Run Jest unit tests"
run = "npm test"

[tasks.test-watch]
description = "Run Jest in watch mode"
run = "npm run test:watch"

[tasks.test-coverage]
description = "Run Jest with coverage report"
run = "npm run test:coverage"

[tasks.build]
description = "Compile TypeScript"
run = "npm run build"
